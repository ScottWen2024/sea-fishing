# 娴烽挀閫?CI 绠＄嚎
# 瑙﹀彂鏉′欢锛歱ush 鍒?master/main/dev 鍒嗘敮鏃惰嚜鍔ㄨ繍琛?
name: CI Pipeline

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main]
  workflow_dispatch:  # 鍏佽鎵嬪姩瑙﹀彂

env:
  NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
  ESLINT_USE_FLAT_CONFIG: "false"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ===== Lint =====
      - name: Install lint deps
        working-directory: fishingMNew
        run: npm install --legacy-peer-deps

      - name: Run ESLint
        working-directory: fishingMNew
        run: npx eslint pages/ --ext .js --max-warnings 20
        continue-on-error: false

      # ===== Test =====
      - name: Install test deps
        working-directory: tests
        run: npm install

      - name: Run Jest tests
        working-directory: tests
        run: npx jest --verbose --coverage
        timeout-minutes: 3

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: tests/reports/coverage/
          retention-days: 14
          if-no-files-found: ignore

  # ===== 瀹夊叏妫€鏌ワ紙骞惰杩愯锛?=====
  security-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: npm audit (灏忕▼搴忎緷璧?
        working-directory: fishingMNew
        run: npm install --legacy-peer-deps --package-lock-only && npm audit --audit-level=high || echo "::warning::渚濊禆瀛樺湪楂樺嵄婕忔礊锛岃妫€鏌?
        continue-on-error: true

      - name: npm audit (娴嬭瘯渚濊禆)
        working-directory: tests
        run: npm install --package-lock-only && npm audit --audit-level=high || echo "::warning::娴嬭瘯渚濊禆瀛樺湪楂樺嵄婕忔礊"
        continue-on-error: true

  # ===== CI 鎶ュ憡鎽樿 =====
  ci-summary:
    needs: [lint-and-test, security-check]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Generate CI summary
        run: |
          echo "## 馃帲 娴烽挀閫?CI 缁撴灉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 闃舵 | 缁撴灉 |" >> $GITHUB_STEP_SUMMARY
          echo "|:---|:---|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint + Test | ${{ needs.lint-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**鍒嗘敮:** ${{ github.ref_name }} | **鎻愪氦鑰?** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY